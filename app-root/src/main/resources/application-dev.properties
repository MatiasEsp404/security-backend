# ========================================
# CONFIGURACIÓN DE DESARROLLO (DEV)
# ========================================

# Environment Identifier
app.environment=dev

# Application URLs (Local Development)
app.front-url=http://localhost:3000
app.back-url=http://localhost:8080

# CSRF Configuration (Deshabilitado en desarrollo)
app.csrf.enabled=false

# JWT Configuration (Development - NO usar en producción)
# IMPORTANTE: Esta clave es solo para desarrollo local
jwt.secret=1234567890123456789012345678901234567890

# Database Configuration - H2 In-Memory
spring.datasource.url=jdbc:h2:mem:securitydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.jpa.hibernate.ddl-auto=create-drop
# spring.jpa.show-sql=false


# H2 Console (Solo para desarrollo)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging Configuration (Verbose para desarrollo)
logging.level.root=INFO
logging.level.com.matias=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Email Configuration - MailHog (Development)
email.provider=mailhog
email.smtp.host=localhost
email.smtp.port=1025
email.smtp.from-email=noreply@localhost
email.smtp.from-name=SecurityBackend Development
email.smtp.auth=false
email.smtp.starttls-enable=false

# SpringDoc OpenAPI - Habilitado en desarrollo
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Spring Boot Actuator - Exposición amplia para desarrollo
management.endpoints.web.exposure.include=health,info,metrics,env,beans,configprops,mappings,loggers,heapdump,threaddump
management.endpoint.health.show-details=always
