# ========================================
# CONFIGURACIÓN DE PRODUCCIÓN (PROD)
# ========================================

# Environment Identifier
app.environment=prod

# Application URLs (Production - Variables de entorno)
app.front-url=${APP_FRONT_URL:https://app.example.com}
app.back-url=${APP_BACK_URL:https://api.example.com}

# CSRF Configuration (Habilitado en producción)
app.csrf.enabled=true

# JWT Configuration (Production - DEBE configurarse via variable de entorno)
# CRÍTICO: Usar una clave segura de al menos 256 bits (32+ caracteres)
jwt.secret=${JWT_SECRET}

# Database Configuration - PostgreSQL
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/securitydb?currentSchema=security}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USERNAME}
spring.datasource.password=${POSTGRES_PASSWORD}

# JPA Configuration
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=validate
# spring.jpa.show-sql=false

# H2 Console (Deshabilitado en producción)
spring.h2.console.enabled=false

# Logging Configuration (Nivel INFO/WARN en producción)
logging.level.root=WARN
logging.level.com.matias=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# Email Configuration - SendGrid (Production)
email.provider=sendgrid
email.sendgrid.api-key=${SENDGRID_API_KEY}
email.sendgrid.from-email=${SENDGRID_FROM_EMAIL:noreply@example.com}
email.sendgrid.from-name=${SENDGRID_FROM_NAME:SecurityBackend}

# SpringDoc OpenAPI - Deshabilitado en producción
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Spring Boot Actuator - Exposición limitada en producción
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when-authorized
