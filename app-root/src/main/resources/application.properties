# ========================================
# CONFIGURACIÓN GLOBAL - SECURITY-BACKEND
# ========================================
# Este archivo contiene propiedades compartidas entre todos los entornos.
# Las configuraciones específicas de cada entorno se encuentran en:
# - application-dev.properties (Desarrollo)
# - application-prod.properties (Producción)

# Perfil Activo (Inyectado desde Maven)
spring.profiles.active=@spring.profiles.active@

# Configuración del Servidor
server.port=8080

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# JWT Configuration Base
jwt.access-token.expiration=900000
jwt.refresh-token.expiration=604800000

# Rate Limit Configuration
app.rate-limit.enabled=true

# Email Verification
app.verification.token.expiration-hours=24

# Metadata de Proyecto (Mapeado desde pom.xml)
project.version=@version@

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/swagger/api-docs
springdoc.swagger-ui.path=/swagger/swagger-ui
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.displayRequestDuration=true

# Spring Boot Actuator Base Path
management.endpoints.web.base-path=/actuator
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
