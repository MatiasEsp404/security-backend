# Server Configuration
server.port=8080

# Application URLs
app.front-url=http://localhost:3000
app.back-url=http://localhost:8080

# CSRF Configuration
app.csrf.enabled=false

# JWT Configuration
# IMPORTANTE: Cambiar en producción por una clave segura de al menos 256 bits (32 caracteres)
jwt.secret=1234567890123456789012345678901234567890
jwt.access-token.expiration=900000
jwt.refresh-token.expiration=604800000

# Database Configuration (H2 - para desarrollo)
spring.datasource.url=jdbc:h2:mem:securitydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (solo para desarrollo)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.com.matias=DEBUG
logging.level.org.springframework.security=DEBUG

# Rate Limit Configuration
app.rate-limit.enabled=true

# Email Configuration
# Provider options: mailhog (default), sendgrid
email.provider=mailhog

# MailHog/SMTP Configuration (for development)
email.smtp.host=localhost
email.smtp.port=1025
email.smtp.from-email=noreply@localhost
email.smtp.from-name=MatiasProject
email.smtp.auth=false
email.smtp.starttls-enable=false

# SendGrid Configuration (for production)
# Uncomment and configure for production use:
# email.provider=sendgrid
# email.sendgrid.api-key=${SENDGRID_API_KEY}
# email.sendgrid.from-email=noreply@example.com
# email.sendgrid.from-name=MatiasProject

# Email Verification
app.verification.token.expiration-hours=24

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.persistAuthorization=true

# Spring Boot Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,env,beans,configprops,mappings
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
